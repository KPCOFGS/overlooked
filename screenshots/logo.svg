<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="overlooked icon">
  <defs>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9d5b"/>
      <stop offset="100%" stop-color="#ff7d3b"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6175"/>
      <stop offset="100%" stop-color="#3d4250"/>
    </linearGradient>
  </defs>

  <!-- Back-most assistant bubble (slate, behind) -->
  <path d="M 18 26
           Q 18 18 26 18
           L 78 18
           Q 86 18 86 26
           L 86 58
           Q 86 66 78 66
           L 54 66
           L 42 78
           L 46 66
           L 26 66
           Q 18 66 18 58
           Z"
        fill="url(#bubble2)"/>

  <!-- Foreground user bubble (rust orange, with tail bottom-right) -->
  <path d="M 38 54
           Q 38 46 46 46
           L 102 46
           Q 110 46 110 54
           L 110 90
           Q 110 98 102 98
           L 86 98
           L 100 112
           L 78 98
           L 46 98
           Q 38 98 38 90
           Z"
        fill="url(#bubble)"/>

  <!-- Three white typing dots in foreground bubble -->
  <circle cx="58" cy="72" r="5" fill="#ffffff"/>
  <circle cx="74" cy="72" r="5" fill="#ffffff"/>
  <circle cx="90" cy="72" r="5" fill="#ffffff"/>
</svg>
